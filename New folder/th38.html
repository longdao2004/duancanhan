<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-size: 80%;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0.15rem;
            background-color: #efefef;
            border: 4px double #000;
            background-color: #ffffff;
        }

        #page {
            max-width: 940px;
            min-width: 720px;
            margin: 10px auto 10px auto;
            padding: 20px;
        }

        #logo {
            margin: 10px auto 25px auto;
            text-align: center;
        }

        ul {
            width: 570px;
            padding: 15px;
            margin: 0 auto 0 auto;
            text-align: center;
            border-top: 2px solid #000;
            border-bottom: 1px solid #000;
        }

        li {
            display: inline;
            margin: 0 3px;
        }

        p {
            text-align: center;
            width: 600px;
            margin: 20px auto 20px auto;
            font-weight: normal;
        }

        a {
            color: #000000;
            text-transform: uppercase;
            text-decoration: none;
            padding: 6px 5px 5px 5px;
        }

        a:hover, a.on {
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <div id="page">
        <div id="logo">
            <img src="" width="250px" alt="Tu hoc lap trinh">
        </div>
        <ul id="navigation">
            <li><a href="#" class="on">Trang chu</a></li>
            <li><a href="#">Khoa hoc</a></li>
            <li><a href="#">Tai lieu</a></li>
            <li><a href="#">Gioi thieu</a></li>
            <li><a href="#">Lien he</a></li>
        </ul>
        <p>
            <img src="" alt="toan" width="200px">
        </p>
        <p>
            Chúng tôi cung cấp các khóa học miễn phí chất lượng cao! Hãy trải nghiệm quá trình học tập chủ động tại
            trang www.titv.vn.
        </p>
    </div>
</body>
</html>
