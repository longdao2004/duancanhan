<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porsche Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">PORSCHE</div>
  <nav>
    <ul>
      <li><a href="#">Trang chủ</a></li>
      <li><a href="#models">Models</a></li>
      <li><a href="#about">Giới thiệu</a></li>
      <li><a href="#contact">Liên hệ</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Trải nghiệm Porsche</h1>
    <p>Hiệu suất - Sang trọng - Đẳng cấp</p>
    <button>Khám phá ngay</button>
  </div>
</section>

<section id="models" class="models">
  <h2>Dòng xe nổi bật</h2>
  <div class="car-list">
    <div class="car-card">
      <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a" alt="911">
      <h3>Porsche 911</h3>
    </div>
    <div class="car-card">
      <img src="https://images.unsplash.com/photo-1617814076668-7b8e1b9f3f5b" alt="Taycan">
      <h3>Porsche Taycan</h3>
    </div>
    <div class="car-card">
      <img src="https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6" alt="Cayenne">
      <h3>Porsche Cayenne</h3>
    </div>
  </div>
</section>

<section id="about" class="about">
  <h2>Về Porsche</h2>
  <p>Porsche là biểu tượng của hiệu suất và thiết kế đỉnh cao.</p>
</section>

<section id="contact" class="contact">
  <h2>Liên hệ</h2>
  <form>
    <input type="text" placeholder="Tên của bạn" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Tin nhắn"></textarea>
    <button type="submit">Gửi</button>
  </form>
</section>

<footer>
  <p>© 2026 Porsche Clone</p>
</footer>

</body>
</html>
