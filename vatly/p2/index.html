<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Official Website Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">PORSCHE</div>
        <ul class="nav-links">
            <li><a href="#">Models</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Experience</a></li>
        </ul>
        <div class="menu-icon"><span></span><span></span></div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 class="fade-in">The New 911 GT3 RS</h1>
            <p class="fade-in-delay">Trải nghiệm đỉnh cao của sự cơ động.</p>
            <div class="hero-btns">
                <a href="#" class="btn btn-primary">Khám phá ngay</a>
                <a href="#" class="btn btn-secondary">Cấu hình xe</a>
            </div>
        </div>
        <div class="overlay"></div>
    </section>

    <section class="models">
        <h2>Các dòng xe Porsche</h2>
        <div class="model-grid">
            <div class="model-card">
                <img src="https://images.porsche.com/shape/porsche-logo.svg" alt="Model" class="dummy-img">
                <div class="model-info">
                    <h3>Taycan</h3>
                    <p>Mẫu xe điện thuần khiết.</p>
                </div>
            </div>
            <div class="model-card">
                <img src="https://images.porsche.com/shape/porsche-logo.svg" alt="Model" class="dummy-img">
                <div class="model-info">
                    <h3>Cayenne</h3>
                    <p>Sức mạnh cho mọi địa hình.</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
